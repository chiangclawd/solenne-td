<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg-f" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#2a1440"/>
      <stop offset="100%" stop-color="#050210"/>
    </radialGradient>
    <linearGradient id="robe-f" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a28"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
    <linearGradient id="skin-f" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8c8e0"/>
      <stop offset="100%" stop-color="#8a78a0"/>
    </linearGradient>
    <radialGradient id="eye-f" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="40%" stop-color="#c878ff"/>
      <stop offset="100%" stop-color="#2a0040"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg-f)"/>
  <!-- Void tendrils behind -->
  <path d="M 20 100 Q 40 50 70 80" fill="none" stroke="rgba(160, 80, 220, 0.35)" stroke-width="3"/>
  <path d="M 180 100 Q 160 50 130 80" fill="none" stroke="rgba(160, 80, 220, 0.35)" stroke-width="3"/>
  <path d="M 30 160 Q 20 130 40 110" fill="none" stroke="rgba(160, 80, 220, 0.3)" stroke-width="2"/>
  <path d="M 170 160 Q 180 130 160 110" fill="none" stroke="rgba(160, 80, 220, 0.3)" stroke-width="2"/>
  <!-- Hood / Robe -->
  <path d="M 36 200 L 50 140 Q 100 100 150 140 L 164 200 Z" fill="url(#robe-f)"/>
  <!-- Hood top -->
  <path d="M 60 105 Q 100 40 140 105 Q 130 75 100 70 Q 70 75 60 105 Z" fill="#0a0418"/>
  <!-- Rune glow on robe -->
  <path d="M 85 170 L 95 160 L 95 170 L 105 160 L 105 170 L 115 160" fill="none" stroke="#c878ff" stroke-width="1.2" opacity="0.7"/>
  <!-- Face (pale translucent) -->
  <ellipse cx="100" cy="85" rx="28" ry="34" fill="url(#skin-f)" opacity="0.95"/>
  <!-- Cracked mask — diagonal line -->
  <line x1="75" y1="65" x2="130" y2="105" stroke="#3a1a4a" stroke-width="1.2"/>
  <line x1="90" y1="55" x2="100" y2="95" stroke="#3a1a4a" stroke-width="0.8"/>
  <!-- Silver-white hair at edges -->
  <path d="M 65 85 Q 60 120 75 140" fill="none" stroke="#d8d0dc" stroke-width="3"/>
  <path d="M 135 85 Q 140 120 125 140" fill="none" stroke="#d8d0dc" stroke-width="3"/>
  <!-- Hollow violet eyes (larger, glowing) -->
  <ellipse cx="86" cy="82" rx="5" ry="4" fill="url(#eye-f)"/>
  <ellipse cx="114" cy="82" rx="5" ry="4" fill="url(#eye-f)"/>
  <!-- Dark sockets around eyes -->
  <ellipse cx="86" cy="82" rx="8" ry="5" fill="none" stroke="rgba(30,10,40,0.7)" stroke-width="1"/>
  <ellipse cx="114" cy="82" rx="8" ry="5" fill="none" stroke="rgba(30,10,40,0.7)" stroke-width="1"/>
  <!-- Thin nose -->
  <path d="M 100 90 L 97 108 L 103 108 Z" fill="rgba(90, 60, 100, 0.4)"/>
  <!-- Pale mouth line -->
  <path d="M 90 115 Q 100 116 110 115" fill="none" stroke="rgba(60, 30, 70, 0.7)" stroke-width="1.2"/>
  <!-- Cheekbone hollow -->
  <ellipse cx="80" cy="98" rx="4" ry="2" fill="rgba(40,20,60,0.3)"/>
  <ellipse cx="120" cy="98" rx="4" ry="2" fill="rgba(40,20,60,0.3)"/>
  <!-- Cold purple rim light -->
  <path d="M 130 75 Q 134 90 130 110" fill="none" stroke="rgba(200, 120, 255, 0.5)" stroke-width="2"/>
  <!-- Particles floating -->
  <circle cx="55" cy="60" r="1" fill="rgba(200, 120, 255, 0.7)"/>
  <circle cx="150" cy="70" r="1.2" fill="rgba(200, 120, 255, 0.7)"/>
  <circle cx="40" cy="130" r="0.8" fill="rgba(200, 120, 255, 0.6)"/>
  <circle cx="165" cy="135" r="1" fill="rgba(200, 120, 255, 0.6)"/>
</svg>
