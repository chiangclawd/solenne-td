<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg-k" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1e2b44"/>
      <stop offset="100%" stop-color="#060a15"/>
    </radialGradient>
    <linearGradient id="coat-k" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a4468"/>
      <stop offset="100%" stop-color="#0a1828"/>
    </linearGradient>
    <linearGradient id="skin-k" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8a078"/>
      <stop offset="100%" stop-color="#9a6848"/>
    </linearGradient>
    <radialGradient id="rim-k" cx="100%" cy="0%" r="100%">
      <stop offset="0%" stop-color="rgba(255,215,102,0.6)"/>
      <stop offset="60%" stop-color="rgba(255,215,102,0)"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" fill="url(#bg-k)"/>
  <rect width="200" height="200" fill="url(#rim-k)"/>
  <!-- Coat torso -->
  <path d="M 40 200 L 55 140 Q 100 120 145 140 L 160 200 Z" fill="url(#coat-k)"/>
  <!-- Gold epaulettes -->
  <ellipse cx="55" cy="135" rx="14" ry="8" fill="#ffd166"/>
  <ellipse cx="145" cy="135" rx="14" ry="8" fill="#ffd166"/>
  <circle cx="55" cy="135" r="4" fill="#b8880a"/>
  <circle cx="145" cy="135" r="4" fill="#b8880a"/>
  <!-- Neck -->
  <rect x="88" y="108" width="24" height="22" fill="#9a6848"/>
  <!-- Compass pendant -->
  <circle cx="100" cy="130" r="5" fill="#ffd166" stroke="#b8880a" stroke-width="1"/>
  <line x1="100" y1="127" x2="100" y2="133" stroke="#b8880a" stroke-width="0.8"/>
  <!-- Head -->
  <ellipse cx="100" cy="85" rx="34" ry="38" fill="url(#skin-k)"/>
  <!-- Jaw shadow -->
  <ellipse cx="100" cy="108" rx="26" ry="10" fill="rgba(60,30,20,0.4)"/>
  <!-- Hair -->
  <path d="M 66 75 Q 70 50 100 48 Q 130 50 134 75 Q 130 58 100 56 Q 72 60 66 75 Z" fill="#2a2018"/>
  <!-- Gray streaks -->
  <path d="M 72 72 Q 78 62 90 60" fill="none" stroke="#9a9a9a" stroke-width="1.2"/>
  <path d="M 124 70 Q 120 62 112 60" fill="none" stroke="#9a9a9a" stroke-width="1.2"/>
  <!-- Brow ridge -->
  <path d="M 78 84 Q 90 78 100 82" fill="none" stroke="#3a2a1e" stroke-width="1.8"/>
  <path d="M 100 82 Q 110 78 122 84" fill="none" stroke="#3a2a1e" stroke-width="1.8"/>
  <!-- Scar over left brow -->
  <line x1="80" y1="78" x2="88" y2="86" stroke="#6a3828" stroke-width="1.4"/>
  <!-- Eyes -->
  <ellipse cx="86" cy="89" rx="3.5" ry="2.5" fill="#1a2a3a"/>
  <ellipse cx="114" cy="89" rx="3.5" ry="2.5" fill="#1a2a3a"/>
  <circle cx="87" cy="88" r="0.8" fill="#fff"/>
  <circle cx="115" cy="88" r="0.8" fill="#fff"/>
  <!-- Nose -->
  <path d="M 100 92 L 97 104 L 103 104 Z" fill="rgba(100, 60, 40, 0.25)"/>
  <!-- Mouth -->
  <path d="M 92 111 Q 100 113 108 111" fill="none" stroke="#3a1e14" stroke-width="1.4"/>
  <!-- Stubble -->
  <circle cx="90" cy="106" r="0.6" fill="#3a2a18" opacity="0.6"/>
  <circle cx="95" cy="109" r="0.6" fill="#3a2a18" opacity="0.6"/>
  <circle cx="100" cy="110" r="0.6" fill="#3a2a18" opacity="0.6"/>
  <circle cx="105" cy="109" r="0.6" fill="#3a2a18" opacity="0.6"/>
  <circle cx="110" cy="106" r="0.6" fill="#3a2a18" opacity="0.6"/>
  <!-- Rim light -->
  <path d="M 132 82 Q 136 92 132 108" fill="none" stroke="rgba(255,215,102,0.4)" stroke-width="2"/>
  <!-- Smoke ambient -->
  <ellipse cx="30" cy="180" rx="40" ry="10" fill="rgba(120, 140, 170, 0.15)"/>
  <ellipse cx="170" cy="190" rx="30" ry="6" fill="rgba(120, 140, 170, 0.15)"/>
</svg>
