<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg-p" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1e3a2a"/>
      <stop offset="100%" stop-color="#060a0f"/>
    </radialGradient>
    <linearGradient id="apron-p" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a3828"/>
      <stop offset="100%" stop-color="#1e1008"/>
    </linearGradient>
    <linearGradient id="skin-p" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d0b0"/>
      <stop offset="100%" stop-color="#c89878"/>
    </linearGradient>
    <radialGradient id="glow-p" cx="50%" cy="60%" r="40%">
      <stop offset="0%" stop-color="rgba(110, 235, 140, 0.7)"/>
      <stop offset="100%" stop-color="rgba(110, 235, 140, 0)"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg-p)"/>
  <!-- Glowing crystal held below chin -->
  <circle cx="100" cy="140" r="40" fill="url(#glow-p)"/>
  <!-- Apron -->
  <path d="M 50 200 L 62 135 Q 100 125 138 135 L 150 200 Z" fill="url(#apron-p)"/>
  <!-- Tool straps with copper -->
  <rect x="70" y="145" width="12" height="28" fill="#8a4818" rx="1"/>
  <rect x="76" y="150" width="2" height="18" fill="#e08820"/>
  <rect x="120" y="145" width="12" height="28" fill="#8a4818" rx="1"/>
  <rect x="126" y="150" width="2" height="18" fill="#e08820"/>
  <!-- Crystal in hands at bottom -->
  <path d="M 92 155 L 100 135 L 108 155 L 104 165 L 96 165 Z" fill="#6ee17a" opacity="0.85"/>
  <path d="M 94 155 L 100 140 L 106 155 L 100 160 Z" fill="#c4f5d0"/>
  <!-- Shirt -->
  <rect x="78" y="125" width="44" height="18" fill="#5a4028"/>
  <circle cx="88" cy="130" r="1.5" fill="#8a6038"/>
  <circle cx="100" cy="134" r="1.5" fill="#8a6038"/>
  <circle cx="112" cy="130" r="1.5" fill="#8a6038"/>
  <!-- Neck -->
  <rect x="90" y="105" width="20" height="22" fill="#c89878"/>
  <!-- Head -->
  <ellipse cx="100" cy="80" rx="32" ry="36" fill="url(#skin-p)"/>
  <!-- Platinum blond hair (messy) -->
  <path d="M 70 74 Q 68 46 100 44 Q 132 46 130 74 Q 124 56 100 54 Q 76 58 70 74 Z" fill="#f0e8d8"/>
  <path d="M 72 62 L 76 48" stroke="#d8ccb0" stroke-width="2"/>
  <path d="M 90 52 L 92 42" stroke="#d8ccb0" stroke-width="2"/>
  <path d="M 108 52 L 110 42" stroke="#d8ccb0" stroke-width="2"/>
  <path d="M 126 62 L 128 50" stroke="#d8ccb0" stroke-width="2"/>
  <!-- Glasses — round wire frame -->
  <circle cx="86" cy="85" r="10" fill="rgba(110, 235, 140, 0.18)" stroke="#c8a060" stroke-width="1.5"/>
  <circle cx="114" cy="85" r="10" fill="rgba(110, 235, 140, 0.18)" stroke="#c8a060" stroke-width="1.5"/>
  <line x1="96" y1="85" x2="104" y2="85" stroke="#c8a060" stroke-width="1.5"/>
  <!-- Eyes behind glasses -->
  <circle cx="86" cy="86" r="2" fill="#2a4a2a"/>
  <circle cx="114" cy="86" r="2" fill="#2a4a2a"/>
  <circle cx="87" cy="85" r="0.6" fill="#fff"/>
  <circle cx="115" cy="85" r="0.6" fill="#fff"/>
  <!-- Soot smudge on cheek -->
  <ellipse cx="120" cy="100" rx="6" ry="3" fill="rgba(40, 30, 30, 0.55)"/>
  <!-- Small nose -->
  <path d="M 100 92 L 98 102 L 102 102 Z" fill="rgba(110, 70, 40, 0.25)"/>
  <!-- Faint uncertain smile -->
  <path d="M 95 109 Q 100 111 105 109" fill="none" stroke="#3a1e14" stroke-width="1.2"/>
  <!-- Teal glow reflection on glasses -->
  <circle cx="90" cy="88" r="1.5" fill="rgba(110, 235, 140, 0.9)"/>
  <circle cx="118" cy="88" r="1.5" fill="rgba(110, 235, 140, 0.9)"/>
</svg>
