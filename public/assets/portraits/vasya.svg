<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg-v" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#3a1e18"/>
      <stop offset="100%" stop-color="#0a0608"/>
    </radialGradient>
    <linearGradient id="vest-v" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a4828"/>
      <stop offset="100%" stop-color="#2a1a0e"/>
    </linearGradient>
    <linearGradient id="skin-v" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8b898"/>
      <stop offset="100%" stop-color="#b07856"/>
    </linearGradient>
    <radialGradient id="rim-v" cx="0%" cy="0%" r="100%">
      <stop offset="0%" stop-color="rgba(255,159,67,0.55)"/>
      <stop offset="60%" stop-color="rgba(255,159,67,0)"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg-v)"/>
  <rect width="200" height="200" fill="url(#rim-v)"/>
  <!-- Tactical vest -->
  <path d="M 45 200 L 58 138 Q 100 120 142 138 L 155 200 Z" fill="url(#vest-v)"/>
  <!-- Pouches -->
  <rect x="70" y="155" width="14" height="18" fill="#3a2a18" rx="2"/>
  <rect x="86" y="155" width="14" height="18" fill="#3a2a18" rx="2"/>
  <rect x="102" y="155" width="14" height="18" fill="#3a2a18" rx="2"/>
  <rect x="118" y="155" width="14" height="18" fill="#3a2a18" rx="2"/>
  <!-- Rifle strap -->
  <path d="M 60 140 L 140 195" stroke="#2a1a0e" stroke-width="3" stroke-linecap="round"/>
  <!-- Neck -->
  <rect x="90" y="108" width="20" height="22" fill="#b07856"/>
  <!-- Head -->
  <ellipse cx="100" cy="83" rx="33" ry="37" fill="url(#skin-v)"/>
  <!-- Hair (auburn, tied back) -->
  <path d="M 67 78 Q 68 48 100 46 Q 132 48 133 78 Q 125 58 100 56 Q 75 60 67 78 Z" fill="#7a3418"/>
  <path d="M 133 80 Q 145 80 142 100 Q 138 90 132 88" fill="#5a2418"/>
  <!-- Brows -->
  <path d="M 80 82 Q 90 76 98 80" fill="none" stroke="#3a1a0a" stroke-width="1.8"/>
  <path d="M 102 80 Q 110 76 120 82" fill="none" stroke="#3a1a0a" stroke-width="1.8"/>
  <!-- Eyes with tired lines -->
  <ellipse cx="88" cy="88" rx="3.5" ry="2.5" fill="#2a1a0a"/>
  <ellipse cx="112" cy="88" rx="3.5" ry="2.5" fill="#2a1a0a"/>
  <circle cx="89" cy="87" r="0.8" fill="#fff"/>
  <circle cx="113" cy="87" r="0.8" fill="#fff"/>
  <path d="M 82 94 Q 88 96 94 94" fill="none" stroke="rgba(80,40,20,0.3)" stroke-width="0.8"/>
  <path d="M 106 94 Q 112 96 118 94" fill="none" stroke="rgba(80,40,20,0.3)" stroke-width="0.8"/>
  <!-- Nose -->
  <path d="M 100 90 L 96 103 L 104 103 Z" fill="rgba(110, 60, 40, 0.25)"/>
  <!-- Smirk -->
  <path d="M 92 112 Q 100 116 110 110" fill="none" stroke="#3a1e14" stroke-width="1.5"/>
  <!-- Cheek scar on jawline -->
  <line x1="120" y1="102" x2="126" y2="110" stroke="#7a3828" stroke-width="1.2"/>
  <!-- Cheekbone highlight -->
  <path d="M 82 96 Q 85 104 88 108" fill="none" stroke="rgba(255,200,160,0.3)" stroke-width="2"/>
  <!-- Orange glow ambient -->
  <ellipse cx="20" cy="180" rx="50" ry="15" fill="rgba(255, 100, 40, 0.15)"/>
</svg>
